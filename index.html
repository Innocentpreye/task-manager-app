<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnTrack - Personal Finance</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Chart.js via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-chart-pie"></i> InnTrack</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active"><i class="fa-solid fa-house"></i> Dashboard</a>
                <a href="#transactions-section" class="nav-item"><i class="fa-solid fa-list"></i> Transactions</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <h1>Overview</h1>
            </header>

            <!-- KPI Cards -->
            <section class="kpi-cards">
                <div class="card kpi-card">
                    <div class="kpi-header">
                        <h3>Total Balance</h3>
                        <i class="fa-solid fa-wallet"></i>
                    </div>
                    <p class="kpi-value" id="total-balance">$0.00</p>
                </div>
                <div class="card kpi-card income-card">
                    <div class="kpi-header">
                        <h3>Total Income</h3>
                        <i class="fa-solid fa-arrow-trend-up"></i>
                    </div>
                    <p class="kpi-value" id="total-income">$0.00</p>
                </div>
                <div class="card kpi-card expense-card">
                    <div class="kpi-header">
                        <h3>Total Expenses</h3>
                        <i class="fa-solid fa-arrow-trend-down"></i>
                    </div>
                    <p class="kpi-value" id="total-expenses">$0.00</p>
                </div>
            </section>

            <div class="dashboard-grid">
                <!-- Add Transaction Form -->
                <section class="card form-section">
                    <h2>Add Transaction</h2>
                    <form id="transaction-form">
                        <div class="form-group">
                            <label for="type">Type</label>
                            <select id="type" required>
                                <option value="income">Income</option>
                                <option value="expense">Expense</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="amount">Amount ($)</label>
                            <input type="number" id="amount" step="0.01" min="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" required>
                                <option value="Salary">Salary</option>
                                <option value="Food">Food</option>
                                <option value="Rent">Rent</option>
                                <option value="Transport">Transport</option>
                                <option value="Tech">Tech</option>
                                <option value="Utilities">Utilities</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="description">Description</label>
                            <input type="text" id="description" required placeholder="e.g. Groceries">
                        </div>
                        <button type="submit" class="btn-primary">Add Transaction</button>
                    </form>
                </section>

                <!-- Chart Section -->
                <section class="card chart-section">
                    <h2>Income vs Expenses</h2>
                    <div class="chart-container">
                        <canvas id="financeChart"></canvas>
                    </div>
                </section>
            </div>

            <!-- Transaction History -->
            <section class="card transactions-section" id="transactions-section">
                <div class="section-header">
                    <h2>Transaction History</h2>
                    <div class="filters">
                        <input type="text" id="search-input" placeholder="Search transactions...">
                        <select id="filter-category">
                            <option value="all">All Categories</option>
                            <option value="Salary">Salary</option>
                            <option value="Food">Food</option>
                            <option value="Rent">Rent</option>
                            <option value="Transport">Transport</option>
                            <option value="Tech">Tech</option>
                            <option value="Utilities">Utilities</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <div class="table-container">
                    <table id="transactions-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Description</th>
                                <th>Category</th>
                                <th>Type</th>
                                <th>Amount</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="transactions-list">
                            <!-- Transactions rendered here via JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
